<!-- swimming-pool.html -->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Professional In-Ground Swimming Pool — A-Frame</title>

  <!-- A-Frame -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/aframe/1.5.0/aframe.min.js"></script>
  <script src="script/aframe.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; }

    #info-panel {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      padding: 10px 24px;
      color: rgba(255,255,255,0.85);
      font-size: 13px;
      letter-spacing: 0.04em;
      pointer-events: none;
      white-space: nowrap;
    }
    #info-panel span { color: #60d0ff; font-weight: 600; }

    #loading {
      position: fixed; inset: 0;
      background: #0a1628;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 999;
      transition: opacity 0.8s ease;
    }
    #loading h1 {
      color: #60d0ff;
      font-size: 1.6rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 14px;
    }
    #loading p { color: rgba(255,255,255,0.5); font-size: 0.85rem; }
    .loader-bar {
      width: 200px; height: 3px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
      margin-top: 18px;
      overflow: hidden;
    }
    .loader-fill {
      height: 100%;
      background: linear-gradient(90deg, #0099cc, #60d0ff);
      border-radius: 2px;
      animation: fill 1.4s ease forwards;
    }
    @keyframes fill { from { width: 0% } to { width: 100% } }
  </style>
</head>
<body>

<!-- Loading overlay -->
<div id="loading">
  <h1>🏊 Pool Loading</h1>
  <p>Filling with crystal-clear water…</p>
  <div class="loader-bar"><div class="loader-fill"></div></div>
</div>

<!-- Info HUD -->
<div id="info-panel">
  <span>WASD</span> move &nbsp;·&nbsp; <span>Mouse</span> look &nbsp;·&nbsp;
  <span>Scroll</span> zoom &nbsp;·&nbsp; <span>Ctrl+Alt+I</span> inspector
</div>


<!-- ═══════════════════════════════════════════════════════════
     A-FRAME SCENE
════════════════════════════════════════════════════════════ -->
<a-scene
  renderer="antialias: true; colorManagement: true; physicallyCorrectLights: true; shadowMap: true;"
  shadow="type: pcfsoft"
  background="color: #a8d8f0"
  fog="type: linear; color: #b8e0f5; near: 28; far: 60"
>

  <!-- ── ASSETS ───────────────────────────────────────────────── -->
  <a-assets>
    <!-- Sky gradient texture generated inline -->
  </a-assets>


  <!-- ══════════════════════════════════════════════════════════
       MASTER WRAPPER — move this single entity to reposition
       the entire pool in your scene.

       position  → x y z world position
       rotation  → rotate the whole pool assembly
       scale     → uniform or non-uniform scale
  ═══════════════════════════════════════════════════════════ -->
  <a-entity
    id="pool-master-wrapper"
    position="0 0 0"
    rotation="0 0 0"
    scale="1 1 1"
  >

    <!--
      ┌─────────────────────────────────────────────────────────┐
      │  SWIMMING POOL COMPONENT                                 │
      │  All visual building is done inside swimming-pool.js     │
      │                                                          │
      │  Attributes you can tweak:                               │
      │   width        — pool width  (X axis)                    │
      │   length       — pool length (Z axis)                    │
      │   depth        — how deep the pool is sunken             │
      │   chairCount   — total lounge chairs (split each side)   │
      │   umbrellaCount— umbrellas (alternating sides)           │
      │   waterOpacity — 0.0 – 1.0                               │
      └─────────────────────────────────────────────────────────┘
    -->
    <a-entity
      id="pool-root"
      swimming-pool="width:6; length:12; depth:1.4; chairCount:6; umbrellaCount:3; waterOpacity:0.88"
      pool-ripples="poolWidth:6; poolLength:12; count:20"
      pool-lane-lines="poolWidth:6; poolLength:12; depth:1.4; lanes:3"
      position="0 0 0"
    ></a-entity>

    <!-- Ground plane (grass / patio surround) -->
    <a-plane
      id="ground"
      width="50" height="50"
      rotation="-90 0 0"
      position="0 -0.01 0"
      material="color:#6ab04c; roughness:0.95; metalness:0.0"
      shadow="receive:true"
    ></a-plane>

    <!-- Far grass area -->
    <a-plane
      width="80" height="80"
      rotation="-90 0 0"
      position="0 -0.02 0"
      material="color:#5a9a3c; roughness:1.0"
    ></a-plane>

  </a-entity>
  <!-- ── END pool-master-wrapper ──────────────────────────────── -->


  <!-- ── ENVIRONMENT ──────────────────────────────────────────── -->

  <!-- Sky with gradient using a large sphere -->
  <a-sky color="#7ec8e3"></a-sky>

  <!-- Sun disc hint (large emissive sphere far away) -->
  <a-sphere
    position="30 40 -30"
    radius="3.5"
    material="color:#fff8cc; emissive:#ffdd44; emissiveIntensity:1.5; shader:flat"
    visible="true"
  ></a-sphere>

  <!-- Distant hedge / tree line (simple boxes) -->
  <a-entity position="0 0 -22">
    <a-box width="60" height="3.5" depth="1.5"
      position="0 1.75 0"
      material="color:#2d6a2d; roughness:1.0"
    ></a-box>
    <a-box width="60" height="2.2" depth="1.5"
      position="0 3.5 0"
      material="color:#3a8a3a; roughness:1.0"
    ></a-box>
  </a-entity>
  <a-entity position="0 0 22" rotation="0 180 0">
    <a-box width="60" height="3.0" depth="1.5"
      position="0 1.5 0"
      material="color:#2d6a2d; roughness:1.0"
    ></a-box>
  </a-entity>


  <!-- ── GLOBAL LIGHTING ──────────────────────────────────────── -->
  <a-light type="ambient"     color="#cce8ff" intensity="0.45"></a-light>
  <a-light type="directional" color="#fff9ee" intensity="1.1"
    position="10 20 8" cast-shadow="true"
    shadow-camera-automatic="true"
  ></a-light>
  <!-- Fill light from sky side -->
  <a-light type="directional" color="#aaddff" intensity="0.3"
    position="-5 8 -10"
  ></a-light>


  <!-- ── CAMERA RIG ────────────────────────────────────────────── -->
  <a-entity id="camera-rig" position="0 1.6 18">
    <a-camera
      id="main-camera"
      look-controls="reverseMouseDrag:false; touchEnabled:true"
      wasd-controls="acceleration:12"
      fov="65"
    >
      <!-- Crosshair -->
      <a-cursor
        fuse="false"
        material="color:#ffffff; opacity:0.6; shader:flat"
        geometry="primitive:ring; radiusInner:0.005; radiusOuter:0.009"
      ></a-cursor>
    </a-camera>
  </a-entity>

</a-scene>


<!-- ── Swimming pool component script ──────────────────────── -->
<script src="swimming-pool.js"></script>

<!-- ── Scene ready: hide loader ─────────────────────────────── -->
<script>
  document.querySelector('a-scene').addEventListener('loaded', () => {
    setTimeout(() => {
      const l = document.getElementById('loading');
      l.style.opacity = '0';
      setTimeout(() => l.remove(), 800);
    }, 1200);
  });
</script>

</body>
</html>
