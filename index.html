<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Scene Viewer</title>
    <script src="script/aframe.js"></script>
    <script src="swimming-pool.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
        }
        .loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }
        .loading.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .loading-text {
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: 4px;
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }
        .info-panel {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            padding: 15px 20px;
            border-radius: 10px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 14px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .info-panel h3 {
            margin: 0 0 10px 0;
            font-size: 16px;
            color: #4fc3f7;
        }
        .info-panel p {
            margin: 5px 0;
            opacity: 0.8;
        }
        .controls-hint {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            padding: 15px 20px;
            border-radius: 10px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 12px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .controls-hint h4 {
            margin: 0 0 10px 0;
            color: #4fc3f7;
        }
        .controls-hint ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .controls-hint li {
            margin: 5px 0;
            opacity: 0.8;
        }
        .controls-hint kbd {
            background: rgba(255, 255, 255, 0.2);
            padding: 2px 6px;
            border-radius: 3px;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="loading" id="loading">
        <div class="loading-text">Loading Villa & Pool...</div>
    </div>

    <div class="info-panel">
        <h3>🏠 Villa with Pool</h3>
        <p>House: scene.glb</p>
        <p>Pool: Animated water + lounge chairs</p>
        <p>Lighting: Evening ambience + underwater</p>
    </div>

    <div class="controls-hint">
        <h4>Controls</h4>
        <ul>
            <li><kbd>🖱️ Left Drag</kbd> Rotate view</li>
            <li><kbd>🖱️ Right Drag</kbd> Pan</li>
            <li><kbd>🔍 Scroll</kbd> Zoom in/out</li>
            <li><kbd>W</kbd><kbd>S</kbd> Move forward/back</li>
            <li><kbd>A</kbd><kbd>D</kbd> Strafe left/right</li>
            <li><kbd>Q</kbd><kbd>E</kbd> Move down/up</li>
        </ul>
    </div>

    <a-scene 
        renderer="antialias: true; colorManagement: true; highRefreshRate: true; physicallyCorrectLights: true"
        background="color: #1a1a2e"
        vr-mode-ui="enabled: false"
        loading-screen="enabled: false">
        
        <!-- Assets -->
        <a-assets timeout="3000000">
        </a-assets>

        <!-- Environment Lighting - Multiple lights for realistic illumination -->
        <a-entity id="environment">
            <!-- Hemisphere light for ambient sky/ground coloring -->
            <a-light type="hemisphere" 
                     intensity="0.8" 
                     color="#ffffff" 
                     groundColor="#4a4a6a"></a-light>
            
            <!-- Directional light simulating sun -->
            <a-light type="directional" 
                     intensity="1.2" 
                     color="#fff5e6" 
                     position="-1 3 2"
                     cast-shadow="true"></a-light>
            
            <!-- Point lights for interior ambiance -->
            <a-light type="point" 
                     intensity="0.8" 
                     color="#87ceeb" 
                     position="5 4 5"
                     distance="20"></a-light>
            
            <a-light type="point" 
                     intensity="0.6" 
                     color="#ffb6c1" 
                     position="-5 3 -5"
                     distance="15"></a-light>
            
            <a-light type="point" 
                     intensity="0.5" 
                     color="#98fb98" 
                     position="0 5 0"
                     distance="25"></a-light>
        </a-entity>

        <!-- Sky with gradient for realistic environment -->
        <a-sky color="#1a1a2e"></a-sky>

        <!-- Grass Ground Plane (large base for entire scene) -->
        <a-plane
            position="0 -0.1 0"
            rotation="-90 0 0"
            width="200"
            height="200"
            material="src: url(models/textures/ground_herbe_2_Wall_Entity_Material_baseColor.jpeg); repeat: 30 30; roughness: 0.95; metalness: 0.0"
            shadow="receive: true">
        </a-plane>

        <!-- Main 3D Model -->
        <a-entity id="scene-model" position="0 0 0" scale="1 1 1">
            <a-gltf-model
                src="models/scene.glb"
                crossorigin="anonymous"
                position="0 0 0"
                scale="1 1 1"
                shadow="cast: true; receive: true">
            </a-gltf-model>
        </a-entity>

        <!-- Swimming Pool -->
        <a-entity id="pool-master-wrapper" position="34.6 9 1.7" rotation="0 90 0">
            <a-entity
                id="pool-root"
                swimming-pool="width:5.0; length:10.3; depth:1.0; chairCount:6; waterOpacity:0.88"
                pool-ripples="poolWidth:5.0; poolLength:10; count:20"
            ></a-entity>
        </a-entity>

        <!-- Camera with orbit controls -->
        <a-entity id="rig" position="0 8 75" height-controls="speed: 0.5">
            <a-entity id="camera" camera look-controls wasd-controls position="0 0 0">
                <a-cursor 
                    color="#4fc3f7" 
                    scale="0.5 0.5 0.5"
                    fuse="true" 
                    timeout="1500">
                </a-cursor>
            </a-entity>
        </a-entity>
    </a-scene>

    <script>
        // Register height control component
        AFRAME.registerComponent('height-controls', {
            schema: {
                enabled: {type: 'boolean', default: true},
                speed: {type: 'number', default: 0.5}
            },

            init: function() {
                this.rig = document.getElementById('rig');
                this.handleKeyDown = this.handleKeyDown.bind(this);
                document.addEventListener('keydown', this.handleKeyDown);
            },

            remove: function() {
                document.removeEventListener('keydown', this.handleKeyDown);
            },

            handleKeyDown: function(e) {
                if (!this.data.enabled || !this.rig) return;

                if (e.key.toLowerCase() === 'e') {
                    this.rig.object3D.position.y += this.data.speed;
                } else if (e.key.toLowerCase() === 'q') {
                    this.rig.object3D.position.y -= this.data.speed;
                }
            }
        });

        // Hide loading screen when scene is loaded
        document.addEventListener('DOMContentLoaded', function() {
            const scene = document.querySelector('a-scene');
            const loading = document.getElementById('loading');
            
            scene.addEventListener('loaded', function() {
                setTimeout(() => {
                    loading.classList.add('hidden');
                }, 500);
            });

            // Also handle model specifically
            const model = document.querySelector('a-gltf-model');
            if (model) {
                model.addEventListener('model-loaded', function() {
                    console.log('3D Model loaded successfully!');
                    loading.classList.add('hidden');
                });
            }

            // Handle any loading errors
            scene.addEventListener('loading-error', function(e) {
                console.error('Scene loading error:', e);
                loading.querySelector('.loading-text').textContent = 'Error Loading Scene';
                loading.querySelector('.loading-text').style.color = '#ff6b6b';
            });
        });

        // Add keyboard shortcuts for camera control enhancements
        document.addEventListener('keydown', function(e) {
            const rig = document.getElementById('rig');
            const camera = document.getElementById('camera');
            const speed = 0.5;

            if (!rig || !camera) return;

            // Get camera's forward direction (ignoring Y for horizontal movement)
            const direction = new THREE.Vector3();
            camera.object3D.getWorldDirection(direction);
            direction.y = 0;
            direction.normalize();

            // Get camera's right direction (strafe)
            const right = new THREE.Vector3();
            right.crossVectors(direction, new THREE.Vector3(0, 1, 0));

            switch(e.key.toLowerCase()) {
                case 'w':
                    // Move forward
                    rig.object3D.position.addScaledVector(direction, -speed);
                    break;
                case 's':
                    // Move backward
                    rig.object3D.position.addScaledVector(direction, speed);
                    break;
                case 'a':
                    // Strafe left
                    rig.object3D.position.addScaledVector(right, speed);
                    break;
                case 'd':
                    // Strafe right
                    rig.object3D.position.addScaledVector(right, -speed);
                    break;
            }
        });

        // Add smooth camera movement
        document.addEventListener('wheel', function(e) {
            const rig = document.getElementById('rig');
            if (!rig) return;
            
            const zoomSpeed = 0.02;
            rig.object3D.position.z += e.deltaY * zoomSpeed;
            
            // Clamp zoom distance
            rig.object3D.position.z = Math.max(5, Math.min(50, rig.object3D.position.z));
        });
    </script>
</body>
</html>
